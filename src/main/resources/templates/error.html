<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${topic}">Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="alert alert-warning text-center">

        <p><strong><span th:text="${error}"> -Error- 😕</span></strong></p>
        <p><strong>Status:</strong> <span th:text="${status}">-Code-</span></p>
        <p><strong>Message:</strong> <span th:text="${message}">-Message-</span></p>
        <p><strong>Path:</strong> <span th:text="${path}">/Unknown</span></p>
        <a th:href="@{/view/books}" class="btn btn-primary mt-3">Back to Main page</a>
    </div>
</div>
</body>
</html>
