<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:margin="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Book Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="text-center mb-4">
        <h2 class="mb-1">📚 Dynamic Book Search (Specification-Based)</h2>
        <p class="text-muted mb-0">Dynamic filtering with AND/OR logic, pagination, and sorting</p>
    </div>
    <!-- Search Form Part -->
    <div class="card p-4 mb-5 shadow-sm border-primary">

        <form th:action="@{/view/books}" th:object="${search}" method="get">
<!--            Error message display-->
            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                <ul class="mb-0">
                    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                </ul>
            </div>
            <h5 class="mb-3 fw-bold text-primary">Advanced Search Options</h5>
<!--            Search form part-->
            <div class="row g-2 mb-2">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Title</label>
                    <input th:field="*{title}" class="form-control form-control-sm">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Genre</label>
                    <select th:field="*{genre}" class="form-select form-select-sm">
                        <option value="">All Genres</option>
                        <option th:each="g : ${genres}" th:value="${g}" th:text="${g}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Author</label>
                    <input th:field="*{author}" class="form-control form-control-sm" >
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Publisher</label>
                    <select th:field="*{publisherName}" class="form-select form-select-sm">
                        <option value="">All Publishers</option>
                        <option th:each="p : ${publishers}" th:value="${p}" th:text="${p}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Min Price</label>
                    <input th:field="*{minPrice}" type="number" step="0.01" class="form-control form-control-sm">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Max Price</label>
                    <input th:field="*{maxPrice}" type="number" step="0.01" class="form-control form-control-sm">
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Publish Year From</label>
                    <input th:field="*{publishYearFrom}" type="number" class="form-control form-control-sm" min="1000" max="2030" placeholder="e.g. 2020">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Publish Year To</label>
                    <input th:field="*{publishYearTo}" type="number" class="form-control form-control-sm" min="1000" max="2030" placeholder="e.g. 2026">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Availability</label>
                    <select th:field="*{availability}" class="form-select form-select-sm">
                        <option value="">All</option>
                        <option value="true">Available</option>
                        <option value="false">Unavailable</option>
                    </select>
                </div>
            </div>
            <div class="row g-2 mb-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small d-block">Combine filters</label>
                    <div class="form-check form-check-inline">
                        <input th:field="*{searchMode}" type="radio" value="AND" class="form-check-input">
                        <label class="form-check-label small">Match all conditions (AND)</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input th:field="*{searchMode}" type="radio" value="OR" class="form-check-input">
                        <label class="form-check-label small">Match any condition (OR)</label>
                    </div>
                </div>
            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary btn-sm px-4">Search</button>
                <a th:href="@{/view/books}" class="btn btn-outline-secondary btn-sm px-3 ms-2">Reset</a>
            </div>
        </form>
    </div>

    <!-- Showing the number of results-->
    <div class="mt-2 mb-3 text-center text-secondary fw-medium"
         th:if="${page.totalElements > 0}" style="font-size: 0.95rem;">
        Showing
        <span th:text="${page.number * page.size + 1}"></span>
        -
        <span th:text="${page.number * page.size + page.content.size()}"></span>
        of
        <span th:text="${page.totalElements}"></span>
        results
    </div>

    <!-- Search Results-->
    <table class="table table-striped table-bordered mt-4">
        <thead class="table-light">
        <tr>
<!--            Title heaader-->
            <th>
                <a th:href="@{/view/books(
                page=0,
                size=${page.size},
                sort='title,' + (${sortDir == 'asc' ? 'desc' : 'asc'}),
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">
                    Title
                    <span th:if="${sortBy == 'title'}"
                          th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>

<!--            Genre header-->
            <th>
                <a th:href="@{/view/books(
                page=0,
                size=${page.size},
                sort='genre,' + (${sortDir == 'asc' ? 'desc' : 'asc'}),
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">
                    Genre
                    <span th:if="${sortBy == 'genre'}"
                          th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>
<!--            Authors header-->
            <th>Authors</th>

<!--            Publisher Name header-->
            <th>
                <a th:href="@{/view/books(
                page=0,
                size=${page.size},
                sort='publisherName,' + (${sortDir == 'asc' ? 'desc' : 'asc'}),
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">
                    Publisher
                    <span th:if="${sortBy == 'publisherName'}"
                          th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>


            <!--            Price header-->
            <th>
                <a th:href="@{/view/books(
                page=0,
                size=${page.size},
                sort='price,' + (${sortDir == 'asc' ? 'desc' : 'asc'}),
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">
                    Price
                    <span th:if="${sortBy == 'price'}"
                          th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>
<!--            Availability header-->
            <th>In Stock</th>
<!--            PublishYear header-->
            <th>Year</th>
        </tr>
        </thead>


        <tbody>
        <tr th:each="searchResult : ${page.content}">
            <td th:text="${searchResult.title}"></td>
            <td th:text="${searchResult.genre}"></td>
            <td th:text="${#strings.arrayJoin(searchResult.authors, ', ')}"></td>
            <td th:text="${searchResult.publisherName}"></td>
            <td th:text="${searchResult.price}"></td>
            <td th:text="${searchResult.availability ? '✅' : '❌'}"></td>
            <td th:text="${searchResult.publishYear}"></td>
        </tr>
        <tr th:if="${page.content.empty}">
            <td colspan="7" class="text-center text-muted">No results found for current search</td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination Part-->
<!--    <div class="pagination" th:if="${page.totalElements > 0}">-->
<!--        <ul style="list-style:none; display:flex; gap:6px; justify-content:center;" >-->
    <div class="pagination d-flex justify-content-center mt-3" th:if="${page.totalElements > 0}">
        <ul class="mb-0 ps-0 d-flex gap-2" style="list-style:none;">


            <!--Prev link-->
            <li th:if="${page.hasPrevious()}">
                <a th:href="@{/view/books(
                page=${page.number - 1},
                size=${page.size},
                sort=${param.sort},
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">Prev</a>
            </li>

            <!--First Page-->
            <li th:if="${pageRange != null and !pageRange.isEmpty() and pageRange[0] > 1}">
                <a th:href="@{/view/books(
                page=0,
                size=${page.size},
                sort=${param.sort},
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">1</a>
                <span>...</span>
            </li>

            <!-- Middle pages -->
            <li th:each="pageNum : ${pageRange}">
                <a th:if="${pageNum != page.number + 1}"
                   th:href="@{/view/books(
                    page=${pageNum - 1},
                    size=${page.size},
                    sort=${param.sort},
                    title=${search.title},
                    genre=${search.genre},
                    author=${search.author},
                    publisherName=${search.publisherName},
                    minPrice=${search.minPrice},
                    maxPrice=${search.maxPrice},
                    publishYearFrom=${search.publishYearFrom},
                    publishYearTo=${search.publishYearTo},
                    availability=${search.availability},
                    searchMode=${search.searchMode}
                )}"
                   th:text="${pageNum}"></a>
                <span th:if="${pageNum == page.number + 1}" th:text="${pageNum}" style="font-weight:bold;"></span>
            </li>

            <!-- if there is any page remain.. -->
            <li th:if="${pageRange != null and !pageRange.isEmpty() and pageRange[pageRange.size()-1] < page.totalPages}">
                <span>...</span>
                <a th:href="@{/view/books(
                page=${page.totalPages - 1},
                size=${page.size},
                sort=${param.sort},
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}"
                   th:text="${page.totalPages}"></a>
            </li>

            <!-- Next Link -->
            <li th:if="${page.hasNext()}">
                <a th:href="@{/view/books(
                page=${page.number + 1},
                size=${page.size},
                sort=${param.sort},
                title=${search.title},
                genre=${search.genre},
                author=${search.author},
                publisherName=${search.publisherName},
                minPrice=${search.minPrice},
                maxPrice=${search.maxPrice},
                publishYearFrom=${search.publishYearFrom},
                publishYearTo=${search.publishYearTo},
                availability=${search.availability},
                searchMode=${search.searchMode}
            )}">Next</a>
            </li>

        </ul>
    </div>
<!--    <&#45;&#45;  sort=${param.sort},  &#45;&#45; >sort=${sortBy + ',' + sortDir} &ndash;&gt;-->

</div>

</body>
</html>
