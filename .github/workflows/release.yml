# tag → build → SBOM → docker build → scan → push → create release → attach SBOM
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  #GitHub Release and Asset Attachment

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: shirinjam/dynamic-book-search

jobs:
  release:
    name: Build, Scan, Publish Versioned Image, Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"  
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name:  Verify project and generate SBOM
        run: mvn -B clean verify

      - name: Check SBOM files exist
        shell: bash
        run: |
          echo "Inspecting generated SBOM files..."
          find target -type f | sort
          test -f target/classes/bom.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{steps.vars.outputs.image_ref}}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin v0.69.3
          trivy --version

      - name: Scan Docker image with Trivy CLI
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            --timeout 15m \
            "${{steps.vars.outputs.image_ref}}"

      - name: Log in to docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: shirinjam
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Tag image as latest
        shell: bash
        run: |
          docker tag "${{steps.vars.outputs.image_ref}}" "${{steps.vars.outputs.latest_ref}}"

      - name: Push Docker images
        shell: bash
        run: |
          docker push "${{ steps.vars.outputs.image_ref }}"
          docker push "${{ steps.vars.outputs.latest_ref }}"


      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{  secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.vars.outputs.tag }}"

      - name: Attach SBOM files to Release
        env:
          GITHUB_TOKEN: ${{  secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.vars.outputs.tag }}" \
            "target/classes/bom.json#CycloneDX SBOM JSON" \
            --clobber